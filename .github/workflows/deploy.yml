name: Deploy React App to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4  # 👈 CORREGIDO AQUÍ
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: pokemon-app/package.json

      - name: Install dependencies
        run: |
          cd pokemon-app
          npm ci

      - name: Build project
        run: |
          cd pokemon-app
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pokemon-app/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
